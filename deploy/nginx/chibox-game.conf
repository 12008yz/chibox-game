# =============================================================================
# ChiBox — основной сайт (chibox-game.ru + www)
# =============================================================================
# Скопируйте на сервер и подключите симлинком, например:
#   sudo cp deploy/nginx/chibox-game.conf /etc/nginx/sites-available/chibox-game
#   sudo ln -sf /etc/nginx/sites-available/chibox-game /etc/nginx/sites-enabled/chibox-game
# Пути поправьте под ваш сервер (dist, сертификаты).
#
# Важно для мобильных сетей и Cloudflare:
#   - proxy_set_header X-Forwarded-Host $host; — бэкенд (app.js) сверяет Host с учётом прокси.
#   - WebSocket (Socket.IO): map + Upgrade / Connection ниже.
#   - Если стоит Cloudflare: раскомментируйте real_ip и список IP из их документации.
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream chibox_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# --- HTTPS (основной) ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chibox-game.ru www.chibox-game.ru;

    ssl_certificate     /etc/letsencrypt/live/chibox-game.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chibox-game.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    # Если файла нет: openssl dhparam -out /etc/letsencrypt/ssl-dhparams.pem 2048
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/chibox/frontend/dist;
    index index.html;

    access_log /var/log/nginx/chibox-game-access.log;
    error_log  /var/log/nginx/chibox-game-error.log;

    client_max_body_size 32m;

    # Раскомментируйте при проксировании через Cloudflare (актуальный список IP — у CF):
    # set_real_ip_from 103.21.244.0/22;
    # set_real_ip_from 103.22.200.0/22;
    # ... остальные диапазоны ...
    # real_ip_header CF-Connecting-IP;

    # Реферальные короткие ссылки на основном домене (если нужны здесь же):
    # include /var/www/chibox/backend/nginx-referral-r-location.conf;

    location /api/ {
        proxy_pass http://chibox_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_buffering     off;
    }

    # Socket.IO (тот же процесс, что и API)
    location /socket.io/ {
        proxy_pass http://chibox_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# --- HTTP → HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name chibox-game.ru www.chibox-game.ru;
    return 301 https://chibox-game.ru$request_uri;
}
